<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détourage Photo Professionnel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>Service de Détourage IA</h1>
        <input type="file" id="file-input" accept="image/*">
        
        <div id="loading" class="hidden">Traitement de votre image en cours...</div>
        
        <div class="preview-area">
            <div>
                <p>Originale</p>
                <img id="original-preview" class="hidden" alt="Originale">
            </div>
            <div>
                <p>Résultat</p>
                <img id="result-preview" class="hidden" alt="Résultat">
            </div>
        </div>
        
        <a id="download-btn" class="hidden" href="#" download="image-detouree.png">Télécharger le résultat</a>
    </div>
    <script src="app.js"></script>
</body>
</html>
